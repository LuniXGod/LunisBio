name: Update Telegram profile

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: telegram-profile
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch Telegram profile
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_USER_ID:   ${{ vars.TG_USER_ID }}
        run: python scripts/fetch_profile.py

      - name: Commit changes if any
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile.json
          git add assets/avatar.png 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No profile changes."
          else
            git commit -m "chore: update Telegram profile [skip ci]"
            git push
          fi
