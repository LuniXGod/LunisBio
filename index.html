<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0a0a0c" />
<title>Luni</title>
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg?v=4" />

<!--
  =====================================================================
   guns.lol-style personal bio page
  =====================================================================
   Pure static site: vanilla HTML + CSS + JS. No build step, no backend.
   Works opened directly (file://) and on GitHub Pages.

   -------------------------------------------------------------------
   DROP THESE FILES INTO  /assets  (filenames are set in script.js CONFIG):
   -------------------------------------------------------------------
     assets/background.mp4   - full-screen looping background video (muted)
     assets/avatar.png       - your circular profile picture
     assets/center.gif       - OPTIONAL small animated gif shown in the card
     assets/icon1.gif        - center link icon #1 (any image/gif)
     assets/icon2.gif        - center link icon #2
     assets/icon3.gif        - center link icon #3   (add as many as you like)
     assets/track1.mp3       - song #1 for the player
     assets/track2.mp3       - song #2  (add as many as you like)

   Everything user-editable lives in the CONFIG block at the TOP of
   script.js  -  nickname, status, links, playlist, views counter, etc.

   -------------------------------------------------------------------
   DEPLOY TO GITHUB PAGES:
   -------------------------------------------------------------------
     1. Create a repo, push index.html + style.css + script.js + /assets
     2. Repo  ->  Settings  ->  Pages
     3. Source: "Deploy from a branch",  Branch: main  /(root)
     4. Wait ~1 min, open the printed URL. Done.
  =====================================================================
-->

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ============ BACKGROUND LAYERS ============ -->
  <!--
    The background video MUST be H.264 (AVC) in an .mp4 container to autoplay.
    Many .mp4 files are actually H.265/HEVC, ProRes, etc. and won't render.
    ALSO: do NOT strip the audio track. Chrome power-saver PAUSES "video-only"
    (no-audio) background media — which looks like a black, frozen video. Encode
    a SILENT audio track so the browser treats it as normal autoplayable media:
        ffmpeg -i input.mp4 -f lavfi -i anullsrc=channel_layout=stereo:sample_rate=44100 \
               -c:v libx264 -pix_fmt yuv420p -movflags +faststart \
               -vf "scale='min(1280,iw)':-2" -c:a aac -shortest assets/background.mp4
    (The script also retries play() on every readiness event + first interaction.)
  -->
  <video id="bg-video" class="bg-video" autoplay muted loop playsinline preload="auto" poster="">
    <source id="bg-video-src" src="assets/background.mp4" type="video/mp4" />
  </video>
  <div class="bg-overlay" aria-hidden="true"></div>
  <div class="bg-grain" aria-hidden="true"></div>
  <div class="bg-vignette" aria-hidden="true"></div>

  <!-- ============ ENTER GATE (unlocks audio + reveals page) ============ -->
  <div id="enter-gate" class="enter-gate">
    <button id="enter-btn" class="enter-btn" type="button" data-cursor>
      <span class="enter-text">click to enter</span>
    </button>
  </div>

  <!-- ============ MAIN CONTENT ============ -->
  <main class="content" id="content" aria-hidden="false">

    <!-- Telegram profile card with 3D tilt -->
    <section class="card-wrap">
      <article class="card" id="tilt-card">
        <div class="card-glare" aria-hidden="true"></div>
        <div class="card-inner">

          <img id="center-gif" class="center-gif" alt="" hidden />

          <div class="avatar-wrap">
            <span class="avatar-ring" aria-hidden="true"></span>
            <img id="avatar" class="avatar" alt="avatar" />
          </div>

          <div class="identity">
            <div class="nick-row">
              <h1 id="nick" class="nick">username</h1>
              <span id="status" class="status" title="status">🌙</span>
            </div>
            <p id="username" class="username" hidden>@handle</p>
            <p id="last-seen" class="last-seen">last seen recently</p>
          </div>

        </div>
      </article>
    </section>

    <!-- Center link icons (built from CONFIG.icons) -->
    <nav id="icons" class="icons" aria-label="links"></nav>

  </main>

  <!-- ============ VIEWS COUNTER (bottom-left) ============ -->
  <div class="views" id="views" title="page views">
    <svg class="views-eye" viewBox="0 0 24 24" width="15" height="15" aria-hidden="true">
      <path d="M1.5 12S5 5 12 5s10.5 7 10.5 7-3.5 7-10.5 7S1.5 12 1.5 12Z"
            fill="none" stroke="currentColor" stroke-width="1.6"/>
      <circle cx="12" cy="12" r="3" fill="none" stroke="currentColor" stroke-width="1.6"/>
    </svg>
    <span id="views-count" class="views-count">—</span>
  </div>

  <!-- ============ MUSIC PLAYER (bottom center) ============ -->
  <!-- .player-dock handles fixed centering + perspective so the inner .player
       is free to do the cursor-following 3D tilt without losing its position. -->
  <div class="player-dock">
  <div class="player" id="player" role="region" aria-label="music player" data-cursor>
    <div class="player-glare" aria-hidden="true"></div>

    <!-- SoundCloud-style cloud icon -->
    <div class="player-cloud" aria-hidden="true">
      <svg viewBox="0 0 24 24" width="22" height="22">
        <path d="M7 18h10.5a3.5 3.5 0 0 0 .4-6.98 5 5 0 0 0-9.7-1.2A4 4 0 0 0 7 18Z"
              fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
      </svg>
    </div>

    <div class="player-body">
      <div class="player-top">
        <div class="player-meta">
          <span id="track-title" class="track-title">—</span>
        </div>
        <div class="player-controls">
          <button id="prev" class="ctrl" type="button" aria-label="previous" data-cursor>
            <svg viewBox="0 0 24 24" width="16" height="16"><path d="M18 5v14L8 12l10-7ZM6 5h2v14H6V5Z" fill="currentColor"/></svg>
          </button>
          <button id="playpause" class="ctrl ctrl-play" type="button" aria-label="play" data-cursor>
            <svg id="icon-play" viewBox="0 0 24 24" width="18" height="18"><path d="M7 4v16l13-8L7 4Z" fill="currentColor"/></svg>
            <svg id="icon-pause" viewBox="0 0 24 24" width="18" height="18" hidden><path d="M6 4h4v16H6V4Zm8 0h4v16h-4V4Z" fill="currentColor"/></svg>
          </button>
          <button id="next" class="ctrl" type="button" aria-label="next" data-cursor>
            <svg viewBox="0 0 24 24" width="16" height="16"><path d="M6 5v14l10-7L6 5Zm12 0h-2v14h2V5Z" fill="currentColor"/></svg>
          </button>
        </div>
      </div>

      <div class="player-progress">
        <span id="cur-time" class="time">0:00</span>
        <div id="seek" class="seek" role="slider" aria-label="seek" tabindex="0"
             aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
          <div id="seek-fill" class="seek-fill"></div>
          <div id="seek-handle" class="seek-handle"></div>
        </div>
        <span id="dur-time" class="time">0:00</span>
      </div>
    </div>
  </div>
  </div>

  <!-- Hidden audio engine -->
  <audio id="audio" preload="metadata"></audio>

  <!-- Shown only if the browser blocks video autoplay -->
  <div id="video-hint" class="video-hint" aria-hidden="true">click anywhere to start</div>

  <!-- Custom glowing cursor -->
  <div id="cursor" class="cursor-dot" aria-hidden="true"></div>

  <script src="script.js"></script>
</body>
</html>
